name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: tunneldeck-windows-amd64.exe
            build_output: build/bin/tunneldeck-windows-amd64.exe

          - os: macos-latest
            platform: darwin/universal
            artifact_name: tunneldeck-macos-universal.zip
            build_output: build/bin/tunneldeck-macos-universal.zip

          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: tunneldeck-linux-amd64
            build_output: build/bin/tunneldeck-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: wails build -platform ${{ matrix.platform }} -nsis

      - name: Build (macOS / Linux)
        if: matrix.os == 'macos-latest' || matrix.os == 'ubuntu-22.04'
        run: wails build -platform ${{ matrix.platform }}

      - name: Package macOS app
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r tunneldeck-macos-universal.zip TunnelDeck.app

      - name: Rename Windows binary
        if: matrix.os == 'windows-latest'
        run: mv build/bin/tunneldeck.exe build/bin/tunneldeck-windows-amd64.exe

      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-22.04'
        run: mv build/bin/tunneldeck build/bin/tunneldeck-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.build_output }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f | sort | xargs sha256sum > ../checksums.txt
          cat ../checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/windows-latest-build/tunneldeck-windows-amd64.exe
            artifacts/macos-latest-build/tunneldeck-macos-universal.zip
            artifacts/ubuntu-22.04-build/tunneldeck-linux-amd64
            checksums.txt
